<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Band-Former</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
<div id="appShell">

  <!-- ── Left: library sidebar ─────────────────────────────────────────── -->
  <aside id="sidebar">
    <div class="brand">
      <svg class="logo" width="18" height="18" viewBox="0 0 20 20" aria-hidden="true">
        <rect x="2" y="8" width="3" height="10" rx="1.5"/>
        <rect x="8.5" y="3" width="3" height="15" rx="1.5"/>
        <rect x="15" y="11" width="3" height="7" rx="1.5"/>
      </svg>
      Band-Former
    </div>

    <div class="addBox">
      <div class="addRow">
        <input id="ytInput" type="url" placeholder="YouTube link…" />
        <button id="ytBtn" class="primary">Add</button>
      </div>
      <div class="addRow">
        <label class="upload"><input id="fileInput" type="file" accept="audio/*,video/mp4,video/webm,.mkv" hidden />Upload file</label>
        <select id="instSel" title="Instrument to transcribe">
          <option value="guitar">Guitar</option>
          <option value="all">All instruments</option>
          <option value="piano">Piano</option>
          <option value="bass">Bass</option>
          <option value="other">Other</option>
        </select>
        <button id="settingsBtn" title="Processing options">⚙</button>
        <button id="tuningBtn" title="Accuracy tuning — every detection knob, adjustable in-app">Tune</button>
      </div>
      <label class="tilesChk" title="Synthesia-style falling-tiles video: notes read from the VIDEO (near-exact) instead of audio transcription">
        <input type="checkbox" id="tilesChk" /> Piano-tiles video
      </label>
    </div>

    <div class="libLabel">Library</div>
    <div id="songList"></div>
  </aside>

  <!-- ── Center: song header, views, transport dock ────────────────────── -->
  <div id="main">
    <header id="songHeader">
      <div id="songTitle">Add a song to begin</div>
      <div class="badges">
        <span class="badge" id="keyBadge">key —</span>
        <span class="badge" id="bpmBadge">— bpm</span>
        <span class="badge" id="capoBadge" style="display:none">capo —</span>
        <span class="badge" id="diffBadge" style="display:none">difficulty —</span>
      </div>
      <div class="seg" id="viewSeg" title="View">
        <button data-view="overview" class="active">Overview</button>
        <button data-view="player">Player</button>
        <button data-view="roll" style="display:none">Roll</button>
        <button data-view="chords">Chords</button>
        <button data-view="tab">Tab</button>
        <button data-view="vocals">Vocals</button>
        <button data-view="learn">Learn</button>
      </div>
    </header>

    <div id="status" class="status"></div>

    <main id="stageArea">
      <section id="overviewView" class="view"><div id="overviewBody" class="overviewBody"></div></section>

      <section id="playerView" class="view hidden">
        <canvas id="stage"></canvas>
        <aside class="chordPanel">
          <div class="nowLabel">NOW</div>
          <div id="chordName" class="chordName">—</div>
          <div id="chordRole" class="chordRole"></div>
          <div id="chordDiagram" class="diagram"></div>
          <div class="nextLabel">NEXT</div>
          <div id="nextList" class="nextList"></div>
        </aside>
      </section>

      <section id="rollView" class="view hidden"><canvas id="rollStage"></canvas></section>
      <section id="chordsView" class="view hidden"><div id="chordGrid" class="chordGrid"></div></section>
      <section id="tabView" class="view hidden"><canvas id="tabStage"></canvas></section>
      <section id="vocalsView" class="view hidden"><canvas id="vocalStage"></canvas></section>
      <section id="learnView" class="view hidden"><div id="learnBody" class="learnBody"></div></section>

      <!-- processing overlay -->
      <div id="overlay" class="overlay hidden">
        <div class="progressCard">
          <div class="progressTitle" id="overlayMsg">Working...</div>
          <div class="progressSteps" id="progressSteps">
            <div class="pStep" data-step="starting"><span class="stepDot"></span><span class="stepLabel">Initializing</span></div>
            <div class="pStep" data-step="Separating stems"><span class="stepDot"></span><span class="stepLabel">Separating stems</span></div>
            <div class="pStep" data-step="Tracking beats"><span class="stepDot"></span><span class="stepLabel">Tracking beats</span></div>
            <div class="pStep" data-step="Transcribing notes"><span class="stepDot"></span><span class="stepLabel">Transcribing notes</span></div>
            <div class="pStep" data-step="Building tab"><span class="stepDot"></span><span class="stepLabel">Building tab</span></div>
            <div class="pStep" data-step="Arranging"><span class="stepDot"></span><span class="stepLabel">Arranging</span></div>
            <div class="pStep" data-step="Extracting vocals"><span class="stepDot"></span><span class="stepLabel">Extracting vocals</span></div>
          </div>
          <div class="progressSub" id="overlaySub"></div>
        </div>
      </div>
    </main>

    <footer id="dock">
      <button id="playBtn" class="primary" disabled aria-label="Play">
        <svg width="16" height="16" viewBox="0 0 16 16"><path d="M4 3l9 5-9 5z" fill="currentColor"/></svg>
      </button>
      <span id="time" class="time">0:00 / 0:00</span>
      <div id="waveWrap"><canvas id="wave"></canvas></div>
      <div class="seg" id="contentSeg" title="Show">
        <button data-content="both" class="active">Both</button>
        <button data-content="melody">Lead</button>
        <button data-content="chords">Rhythm</button>
        <button data-content="all">All</button>
      </div>
      <label class="ctl">Speed
        <select id="speedSel">
          <option value="0.5">0.5×</option><option value="0.75">0.75×</option>
          <option value="1" selected>1×</option><option value="1.25">1.25×</option><option value="1.5">1.5×</option>
        </select>
      </label>
      <label class="ctl">Capo<select id="capoSel"></select></label>
      <button id="loopBtn" title="Set A then B to loop">Loop</button>
      <button id="metroBtn" title="Metronome">Metro</button>
      <button id="barsBtn" title="Quantize chords to whole bars — one chord per bar, kills rapid changes">Bars</button>
    </footer>
  </div>
</div>

<!-- settings modal -->
<div id="settingsModal" class="modal hidden">
  <div class="modalCard">
    <div class="modalHead"><span>Processing Options</span><button id="settingsClose">✕</button></div>
    <div class="settingsForm">
      <label class="settingRow">
        Separation quality:
        <select id="optSep">
          <option value="best">Best — Roformer + Demucs (2-stage)</option>
          <option value="fast">Fast — Demucs only</option>
        </select>
      </label>
      <label class="settingRow"><input type="checkbox" id="optBeats" checked> Extract Beats</label>
      <label class="settingRow"><input type="checkbox" id="optVocals" checked> Extract Vocals</label>
      <label class="settingRow">
        Instrument (reprocess):
        <select id="optInst" title="'Keep current' reuses the song's stem. Picking a different one forces re-transcription from that stem.">
          <option value="">Keep current</option>
          <option value="guitar">Guitar</option>
          <option value="all">All instruments</option>
          <option value="piano">Piano</option>
          <option value="bass">Bass</option>
          <option value="other">Other</option>
        </select>
      </label>
      <label class="settingRow">
        Vocal Model:
        <select id="optVocalModel">
          <option value="auto">Auto</option>
          <option value="crepe">CREPE (GPU)</option>
          <option value="pyin">pYIN (CPU)</option>
        </select>
      </label>
      <button id="runSettingsBtn" class="primary">Apply & Run</button>
      <button id="redoVocalsBtn" title="Re-extract only the vocals of the current song with the model chosen above — runs in the background, no full reprocess">Redo vocals only (background)</button>
    </div>
  </div>
</div>

<!-- tuning modal -->
<div id="tuningModal" class="modal hidden">
  <div class="modalCard tuningCard">
    <div class="modalHead"><span>Accuracy Tuning</span><button id="tuningClose">✕</button></div>
    <div id="tuningBody" class="tuningBody"></div>
    <div class="tuningFoot">
      <button id="tuningReset" title="Fill every field with its factory default (not saved until you hit Save)">Reset all</button>
      <button id="tuningSave">Save</button>
      <button id="tuningApply" class="primary" title="Save, then reprocess the current song so you hear the difference">Save &amp; reprocess song</button>
    </div>
  </div>
</div>

<script src="/static/app.js"></script>
</body>
</html>
